name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & unit tests
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Show Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Run unit tests
        # MarkzzyTests = pure unit tests, runs in CI without hardware.
        # MarkzzyE2ETests requires real cameras / iPhone — skipped in CI,
        # validated locally before each release.
        run: swift test --filter MarkzzyTests

      - name: Verify entitlements file is well-formed
        run: plutil -lint Resources/Markzzy.entitlements
